<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centros de datos en EE.UU.</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; color: #111; font-family: Arial, sans-serif; }
  .wrapper { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 3rem; }

  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #22567a; margin-bottom: 0.6rem; }
  h1 { font-size: clamp(1.2rem, 2.4vw, 1.75rem); font-weight: 700; line-height: 1.2; color: #111; max-width: 820px; margin-bottom: 0.4rem; }
  .subtitle { font-size: 13px; color: #666; max-width: 680px; line-height: 1.5; margin-bottom: 1.2rem; }

  .legend { display: flex; align-items: flex-end; gap: 2px; margin-bottom: 1.1rem; flex-wrap: wrap; }
  .legend-title { font-size: 11px; color: #888; margin-right: 6px; padding-bottom: 16px; white-space: nowrap; }
  .legend-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .legend-swatch { width: 38px; height: 11px; display: block; }
  .legend-tick { font-size: 10px; color: #777; }

  .map-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 0.7rem; }
  .controls-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.07em; margin-right: 2px; }
  .btn { background: #fff; border: 1px solid #ccc; color: #444; padding: 4px 12px; font-family: Arial, sans-serif; font-size: 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: #22567a; color: #22567a; }
  .btn.active { background: #22567a; border-color: #22567a; color: #fff; }

  svg#map { width: 100%; height: auto; display: block; overflow: visible; }
  .state-path { stroke: #fff; stroke-width: 0.5px; transition: fill 0.35s ease; cursor: pointer; }
  .state-path:hover { stroke: #333; stroke-width: 1.5px; }
  .state-path.selected { stroke: #111; stroke-width: 2.5px; filter: brightness(0.85); }

  .source { font-size: 11px; color: #bbb; margin-top: 0.5rem; margin-bottom: 2rem; }

  /* Bars */
  .bars-section { border-top: 1px solid #eee; padding-top: 1.5rem; }
  .bars-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .bars-title { font-size: 13px; font-weight: 700; color: #111; }

  .bars-legend { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .bars-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .bars-legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; padding: 3px 6px; border-radius: 4px; transition: background 0.15s; cursor: pointer; }
  .bar-row:hover { background: #f0f6fa; }
  .bar-row.highlighted { background: #e6f2f9; }
  .bar-row.highlighted .bar-label { color: #22567a; font-weight: 700; }
  .bar-label { font-size: 11px; color: #333; text-align: right; width: 120px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
  .bar-wrap { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0; }
  .bar-track { height: 13px; display: flex; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .bar-seg { height: 100%; flex-shrink: 0; }
  .bar-val { font-size: 11px; color: #555; font-weight: 700; white-space: nowrap; }

  .tooltip { position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 5px; padding: 6px 10px; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 100; font-size: 12px; font-weight: 400; color: #111; box-shadow: 0 2px 8px rgba(0,0,0,0.1); white-space: nowrap; line-height: 1.7; }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>
<div class="wrapper">

  <h1>Con casi el 40% del total mundial, EE.UU. es el país con más centros de datos del mundo</h1>
  <p class="subtitle">Datos disponibles hasta abril de 2026</p>
  <div style="display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:0.7rem;">
  <div class="map-controls" style="margin-bottom:0">
    <button class="btn active" data-mode="total">Total</button>
    <button class="btn" data-mode="operational">En funcionamiento</button>
    <button class="btn" data-mode="underconstruction">En construcción</button>
    <button class="btn" data-mode="planned">Planificados</button>
  </div>
  <div class="legend" id="legend" style="margin-bottom:0"></div>
  </div>

  <svg id="map" viewBox="0 0 960 600" role="img" aria-label="Mapa coroplético de centros de datos en EE.UU."></svg>
  <div class="bars-section">
    <div class="bars-header">
      <p class="bars-title" id="bars-title">Centros por estado — Total</p>
    </div>
    <div class="bars-legend" id="bars-legend">
      <div class="bars-legend-item"><span class="bars-legend-dot" style="background:#22567a"></span>En funcionamiento</div>
      <div class="bars-legend-item"><span class="bars-legend-dot" style="background:#7db8d8"></span>En construcción</div>
      <div class="bars-legend-item"><span class="bars-legend-dot" style="background:#b8d9ed"></span>Planificados</div>
    </div>
    <div id="bars-container"></div>
  </div>
  <p class="source" style="margin-top:1.2rem;">Fuente: Data Center Map</p>
</div>

<div class="tooltip" id="tt"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const DATA = [{"name":"Indiana","facilities":102,"facilities_operational":45,"facilities_underconstruction":9,"facilities_planned":48},{"name":"Missouri","facilities":91,"facilities_operational":36,"facilities_underconstruction":5,"facilities_planned":50},{"name":"California","facilities":287,"facilities_operational":236,"facilities_underconstruction":4,"facilities_planned":47},{"name":"Kansas","facilities":22,"facilities_operational":15,"facilities_underconstruction":0,"facilities_planned":7},{"name":"Georgia","facilities":212,"facilities_operational":79,"facilities_underconstruction":35,"facilities_planned":98},{"name":"New York","facilities":132,"facilities_operational":121,"facilities_underconstruction":1,"facilities_planned":10},{"name":"Florida","facilities":108,"facilities_operational":93,"facilities_underconstruction":2,"facilities_planned":13},{"name":"Kentucky","facilities":40,"facilities_operational":28,"facilities_underconstruction":0,"facilities_planned":12},{"name":"Massachusetts","facilities":44,"facilities_operational":44,"facilities_underconstruction":0,"facilities_planned":0},{"name":"Washington","facilities":105,"facilities_operational":96,"facilities_underconstruction":2,"facilities_planned":7},{"name":"North Carolina","facilities":89,"facilities_operational":59,"facilities_underconstruction":5,"facilities_planned":25},{"name":"Illinois","facilities":228,"facilities_operational":98,"facilities_underconstruction":10,"facilities_planned":120},{"name":"Texas","facilities":438,"facilities_operational":258,"facilities_underconstruction":50,"facilities_planned":130},{"name":"Hawaii","facilities":9,"facilities_operational":9,"facilities_underconstruction":0,"facilities_planned":0},{"name":"Alabama","facilities":24,"facilities_operational":20,"facilities_underconstruction":1,"facilities_planned":3},{"name":"Alaska","facilities":6,"facilities_operational":4,"facilities_underconstruction":0,"facilities_planned":2},{"name":"Arizona","facilities":157,"facilities_operational":84,"facilities_underconstruction":14,"facilities_planned":59},{"name":"Arkansas","facilities":11,"facilities_operational":7,"facilities_underconstruction":0,"facilities_planned":4},{"name":"Colorado","facilities":56,"facilities_operational":52,"facilities_underconstruction":2,"facilities_planned":2},{"name":"Connecticut","facilities":52,"facilities_operational":19,"facilities_underconstruction":0,"facilities_planned":33},{"name":"Delaware","facilities":18,"facilities_operational":5,"facilities_underconstruction":0,"facilities_planned":13},{"name":"Idaho","facilities":17,"facilities_operational":8,"facilities_underconstruction":1,"facilities_planned":8},{"name":"Iowa","facilities":101,"facilities_operational":58,"facilities_underconstruction":11,"facilities_planned":32},{"name":"Louisiana","facilities":22,"facilities_operational":12,"facilities_underconstruction":0,"facilities_planned":10},{"name":"Maine","facilities":8,"facilities_operational":5,"facilities_underconstruction":0,"facilities_planned":3},{"name":"Maryland","facilities":52,"facilities_operational":23,"facilities_underconstruction":13,"facilities_planned":16},{"name":"Michigan","facilities":73,"facilities_operational":54,"facilities_underconstruction":0,"facilities_planned":19},{"name":"Minnesota","facilities":75,"facilities_operational":40,"facilities_underconstruction":4,"facilities_planned":31},{"name":"Mississippi","facilities":23,"facilities_operational":13,"facilities_underconstruction":8,"facilities_planned":2},{"name":"Montana","facilities":27,"facilities_operational":5,"facilities_underconstruction":0,"facilities_planned":22},{"name":"Nebraska","facilities":36,"facilities_operational":32,"facilities_underconstruction":1,"facilities_planned":3},{"name":"Nevada","facilities":69,"facilities_operational":40,"facilities_underconstruction":4,"facilities_planned":25},{"name":"New Hampshire","facilities":10,"facilities_operational":10,"facilities_underconstruction":0,"facilities_planned":0},{"name":"New Jersey","facilities":67,"facilities_operational":60,"facilities_underconstruction":1,"facilities_planned":6},{"name":"New Mexico","facilities":22,"facilities_operational":19,"facilities_underconstruction":0,"facilities_planned":3},{"name":"North Dakota","facilities":23,"facilities_operational":11,"facilities_underconstruction":1,"facilities_planned":11},{"name":"Ohio","facilities":202,"facilities_operational":149,"facilities_underconstruction":19,"facilities_planned":34},{"name":"Oklahoma","facilities":39,"facilities_operational":30,"facilities_underconstruction":2,"facilities_planned":7},{"name":"Oregon","facilities":122,"facilities_operational":99,"facilities_underconstruction":12,"facilities_planned":11},{"name":"Pennsylvania","facilities":115,"facilities_operational":58,"facilities_underconstruction":1,"facilities_planned":56},{"name":"Rhode Island","facilities":7,"facilities_operational":7,"facilities_underconstruction":0,"facilities_planned":0},{"name":"South Carolina","facilities":42,"facilities_operational":24,"facilities_underconstruction":4,"facilities_planned":14},{"name":"South Dakota","facilities":10,"facilities_operational":4,"facilities_underconstruction":0,"facilities_planned":6},{"name":"Tennessee","facilities":60,"facilities_operational":48,"facilities_underconstruction":4,"facilities_planned":8},{"name":"Utah","facilities":41,"facilities_operational":31,"facilities_underconstruction":4,"facilities_planned":6},{"name":"Vermont","facilities":3,"facilities_operational":3,"facilities_underconstruction":0,"facilities_planned":0},{"name":"Virginia","facilities":599,"facilities_operational":340,"facilities_underconstruction":68,"facilities_planned":191},{"name":"West Virginia","facilities":9,"facilities_operational":7,"facilities_underconstruction":0,"facilities_planned":2},{"name":"Wisconsin","facilities":55,"facilities_operational":33,"facilities_underconstruction":2,"facilities_planned":20},{"name":"Wyoming","facilities":30,"facilities_operational":20,"facilities_underconstruction":4,"facilities_planned":5},{"name":"District of Columbia","facilities":6,"facilities_operational":6,"facilities_underconstruction":0,"facilities_planned":0}];

DATA.forEach(d => { d.ratio = d.facilities_operational > 0 ? +(d.facilities_planned / d.facilities_operational).toFixed(2) : 0; });
const lookup = Object.fromEntries(DATA.map(d => [d.name, d]));

const BLUE  = ['#e8f4fb','#b8d9ed','#7db8d8','#4a8fba','#22567a'];
const AMBER = ['#fef3e2','#fcd99a','#f5a623','#d4841a','#a85f0e'];
const MODES = {
  total:             { key:'facilities',                   label:'Total',           d:[26,76,151,301],       steps:['0–25','26–75','76–150','151–300','301+'],            fmt:v=>v,             amber:false },
  operational:       { key:'facilities_operational',       label:'En funcionamiento',   d:[16,51,101,201],       steps:['0–15','16–50','51–100','101–200','201+'],            fmt:v=>v,             amber:false },
  underconstruction: { key:'facilities_underconstruction', label:'En construcción', d:[6,16,36],             steps:['1–5','6–15','16–35','36+'],                         fmt:v=>v,             amber:false, hasZero:true },
  planned:           { key:'facilities_planned',           label:'Planificados',    d:[31,61,121],           steps:['1–30','31–60','61–120','121+'],                     fmt:v=>v,             amber:false, hasZero:true },
};

let mode = 'total', cScale, selectedState = null, currentSort = 'total';
const maxTotal = Math.max(...DATA.map(d => d.facilities));

function buildScale(m) {
  const cfg = MODES[m];
  const colors = cfg.amber ? AMBER : (cfg.hasZero ? BLUE.slice(1) : BLUE);
  return d3.scaleThreshold().domain(cfg.d).range(colors);
}
function getColor(d) {
  const row = lookup[d.properties.name];
  if (!row) return '#eee';
  return row[MODES[mode].key] === 0 ? '#d8d8d8' : cScale(row[MODES[mode].key]);
}
function renderLegend(m) {
  const cfg = MODES[m], colors = cfg.amber ? AMBER : (cfg.hasZero ? BLUE.slice(1) : BLUE);
  const el = document.getElementById('legend');
  el.innerHTML = '';
  const t = document.createElement('span'); t.className='legend-title'; t.textContent=cfg.label; el.appendChild(t);
  if (cfg.hasZero) {
    const item=document.createElement('div'); item.className='legend-item';
    const sw=document.createElement('span'); sw.className='legend-swatch'; sw.style.background='#d8d8d8';
    const tk=document.createElement('span'); tk.className='legend-tick'; tk.textContent='0';
    item.appendChild(sw); item.appendChild(tk); el.appendChild(item);
  }
  colors.forEach((c,i) => {
    const item=document.createElement('div'); item.className='legend-item';
    const sw=document.createElement('span'); sw.className='legend-swatch'; sw.style.background=c;
    const tk=document.createElement('span'); tk.className='legend-tick'; tk.textContent=cfg.steps[i];
    item.appendChild(sw); item.appendChild(tk); el.appendChild(item);
  });
}

// Highlight state on map
function highlightMap(stateName) {
  d3.selectAll('.state-path').classed('selected', d => d.properties.name === stateName);
}
function clearMap() {
  d3.selectAll('.state-path').classed('selected', false);
}

// Highlight bar in list
function highlightBar(stateName) {
  document.querySelectorAll('.bar-row').forEach(row => {
    const isMatch = row.dataset.state === stateName;
    row.classList.toggle('highlighted', isMatch);
    if (isMatch) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}
function clearBars() {
  document.querySelectorAll('.bar-row').forEach(r => r.classList.remove('highlighted'));
}

// Render bars
const CATS = {
  total:             { key:'facilities',                   stacked:true,  color:null      },
  operational:       { key:'facilities_operational',       stacked:false, color:'#22567a' },
  underconstruction: { key:'facilities_underconstruction', stacked:false, color:'#7db8d8' },
  planned:           { key:'facilities_planned',           stacked:false, color:'#b8d9ed' }
};

function renderBars(cat) {
  const cfg = CATS[cat];
  document.getElementById('bars-legend').style.display = cfg.stacked ? 'flex' : 'none';
  const sorted = [...DATA].sort((a,b) => b[cfg.key] - a[cfg.key]);
  const maxVal = sorted[0][cfg.key];
  const container = document.getElementById('bars-container');
  container.innerHTML = '';
  sorted.forEach(d => {
    const val = d[cfg.key];
    let trackW, barInner;
    if (cfg.stacked) {
      trackW = (d.facilities / maxVal * 75).toFixed(1);
      const sOp=(d.facilities_operational/d.facilities*100).toFixed(1);
      const sUc=(d.facilities_underconstruction/d.facilities*100).toFixed(1);
      const sPl=(d.facilities_planned/d.facilities*100).toFixed(1);
      barInner=`<div class="bar-seg" style="width:${sOp}%;background:#22567a"></div><div class="bar-seg" style="width:${sUc}%;background:#7db8d8"></div><div class="bar-seg" style="width:${sPl}%;background:#b8d9ed"></div>`;
    } else {
      trackW = (val / maxVal * 75).toFixed(1);
      const barColor = val === 0 ? '#d8d8d8' : cScale(val);
      barInner=`<div class="bar-seg" style="width:100%;background:${barColor}"></div>`;
    }
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.dataset.state = d.name;
    row.innerHTML=`<span class="bar-label" title="${d.name}">${d.name}</span><div class="bar-wrap"><div class="bar-track" style="width:${trackW}%">${barInner}</div><span class="bar-val">${val}</span></div>`;

    // Hover bar → highlight map
    row.addEventListener('mouseenter', () => { highlightMap(d.name); });
    row.addEventListener('mouseleave', () => { clearMap(); if (selectedState) highlightMap(selectedState); });

    // Click bar → select
    row.addEventListener('click', () => {
      if (selectedState === d.name) {
        selectedState = null; clearMap(); clearBars();
      } else {
        selectedState = d.name;
        highlightMap(d.name);
        highlightBar(d.name);
      }
    });
    container.appendChild(row);
  });
  // Re-apply highlight if state selected
  if (selectedState) highlightBar(selectedState);
}

// Map setup
const tt = document.getElementById('tt');
d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const proj = d3.geoAlbersUsa().scale(1280).translate([487, 295]);
  const path = d3.geoPath(proj);
  cScale = buildScale(mode);

  d3.select('#map').selectAll('.state-path')
    .data(topojson.feature(us, us.objects.states).features)
    .join('path')
    .attr('class','state-path')
    .attr('d', path)
    .attr('fill', d => getColor(d))
    .on('mousemove', (e, d) => {
      const row = lookup[d.properties.name];
      if (!row) return;
      if (mode === 'total') {
        tt.innerHTML = `<strong>${d.properties.name}: ${row.facilities}</strong><br>
          En funcionamiento: ${row.facilities_operational}<br>
          En construcción: ${row.facilities_underconstruction}<br>
          Planificados: ${row.facilities_planned}`;
      } else {
        tt.textContent = d.properties.name + ': ' + MODES[mode].fmt(row[MODES[mode].key]);
      }
      tt.classList.add('visible');
      tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-32)+'px';
    })
    .on('mouseleave', () => tt.classList.remove('visible'))
    .on('click', (e, d) => {
      const name = d.properties.name;
      if (!lookup[name]) return;
      if (selectedState === name) {
        selectedState = null; clearMap(); clearBars();
      } else {
        selectedState = name;
        clearBars();
        highlightMap(name);
        highlightBar(name);
      }
    });

  renderLegend(mode);
  renderBars('total');

  // SVG annotation for planned mode
  const annPl = d3.select('#map').append('g').attr('id','svg-ann-planned').style('display','none');
  const plLines = [
    { text: 'Montana lidera en ratio', bold: true,  dy: 0,  fill: '#888' },
    { text: 'planificados/activos:', bold: false, dy: 15, fill: '#888' },
    { text: '4.4x — 22 planificados', bold: false, dy: 30, fill: '#888' },
    { text: 'con solo 5 operacionales.', bold: false, dy: 45, fill: '#888' },
  ];
  const plx = 700, ply = 70;
  annPl.append('line')
    .attr('x1', plx).attr('y1', ply + 40)
    .attr('x2', 330).attr('y2', 110)
    .attr('stroke','#aaa').attr('stroke-width','0.8').attr('stroke-dasharray','3,2');
  plLines.forEach(l => {
    annPl.append('text')
      .attr('x', plx).attr('y', ply + l.dy)
      .attr('font-family','Arial').attr('font-size','11.5')
      .attr('font-weight', l.bold ? '700' : '400')
      .attr('fill', l.fill)
      .text(l.text);
  });

  // SVG annotation for underconstruction mode
  const annUc = d3.select('#map').append('g').attr('id','svg-ann-underconstruction').style('display','none');
  const ucLines = [
    { text: '19 estados no tienen', bold: true,  dy: 0,  fill: '#888' },
    { text: 'ningún centro en',     bold: false, dy: 15, fill: '#888' },
    { text: 'construcción.',        bold: false, dy: 30, fill: '#888' },
  ];
  const ucx = 560, ucy = 530;
  ucLines.forEach(l => {
    annUc.append('text')
      .attr('x', ucx).attr('y', ucy + l.dy)
      .attr('font-family','Arial').attr('font-size','11.5')
      .attr('font-weight', l.bold ? '700' : '400')
      .attr('fill', l.fill)
      .text(l.text);
  });

  // SVG annotation for total mode — Gulf of Mexico, between Texas and Florida
  const annG = d3.select('#map').append('g').attr('id','svg-ann-total');

  const lines = [
    { text: 'Virginia y Texas', bold: true, dy: 0, fill: '#22567a' },
    { text: ' lideran', bold: true, dy: 0, fill: '#888', offset: 90 },
    { text: 'en centros activos y',     bold: false, dy: 15, fill: '#888'    },
    { text: 'planificados. Únicos con', bold: false, dy: 30, fill: '#888'    },
    { text: '+300 activos y +100',       bold: false, dy: 45, fill: '#888'   },
    { text: 'planificados.',            bold: false, dy: 60, fill: '#888'    },
  ];
  const ax = 560, ay = 530;
  lines.forEach(l => {
    annG.append('text')
      .attr('x', ax + (l.offset || 0)).attr('y', ay + l.dy)
      .attr('font-family','Arial').attr('font-size','11.5')
      .attr('font-weight', l.bold ? '700' : '400')
      .attr('fill', l.fill)
      .text(l.text);
  });
});

// Deselect on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#map') && !e.target.closest('#bars-container')) {
    if (selectedState) { selectedState = null; clearMap(); clearBars(); }
  }
});

// Map mode toggle — also updates bars
const MODE_TO_CAT = { total:'total', operational:'operational', underconstruction:'underconstruction', planned:'planned' };
const CAT_LABELS  = { total:'Total', operational:'En funcionamiento', underconstruction:'En construcción', planned:'Planificados' };

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedState = null; clearMap(); clearBars();
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    d3.select('#svg-ann-total').style('display', mode === 'total' ? null : 'none');
  d3.select('#svg-ann-underconstruction').style('display', mode === 'underconstruction' ? null : 'none');
  d3.select('#svg-ann-planned').style('display', mode === 'planned' ? null : 'none');
    cScale = buildScale(mode);
    d3.selectAll('.state-path').transition().duration(380).ease(d3.easeCubicInOut).attr('fill', d => getColor(d));
    renderLegend(mode);
    const cat = MODE_TO_CAT[mode] || 'total';
    document.getElementById('bars-title').textContent = 'Centros por estado — ' + CAT_LABELS[cat];
    renderBars(cat);
  });
});


</script>
</body>
</html>
